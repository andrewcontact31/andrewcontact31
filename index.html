<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Ly Andrew</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #f0f8ff;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
        .download-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background: #00c8e0; /* couleur turquoise comme votre CV */
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }
        .download-btn:hover {
            background: #00a8c0;
        }
    </style>
</head>
<body>
    <!-- Affichage direct du PDF -->
    <iframe src="LY_andrew_CV.pdf" title="CV de Ly Andrew"></iframe>

    <!-- Bouton fixe pour télécharger -->
    <a href="LY_andrew_CV.pdf" download class="download-btn">
        Télécharger le CV (PDF)
    </a>
</body>
</html>
