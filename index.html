<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Ly Andrew</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; }
        .container { display: flex; flex-direction: column; height: 100%; }
        .header { background: #00b0f0; color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 28px; }
        .pdf-viewer { flex: 1; background: #f8f8f8; }
        iframe { width: 100%; height: 100%; border: none; }
        .download { text-align: center; padding: 15px; background: #e0f7fa; }
        .download button {
            padding: 12px 30px;
            font-size: 18px;
            background: #00b0f0;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .download button:hover { background: #0088cc; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CV de Ly Andrew</h1>
            <p>Compétent et émergent en solutions électroniques & réseaux</p>
        </div>
        <div class="pdf-viewer">
            <iframe src="LY_andrew_CV.pdf" title="CV Ly Andrew"></iframe>
        </div>
        <div class="download">
            <a href="LY_andrew_CV.pdf" download="Ly_Andrew_CV.pdf">
                <button>Télécharger le CV (PDF)</button>
            </a>
        </div>
    </div>
</body>
</html>
