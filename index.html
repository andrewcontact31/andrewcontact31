<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Ly Andrew</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; background: #f0fafa; }
        .container { display: flex; flex-direction: column; min-height: 100vh; }
        .header { background: #00b0f0; color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 28px; }
        .header p { margin: 10px 0; }
        .cv-image { flex: 1; padding: 20px; background: white; text-align: center; overflow: auto; }
        .cv-image img { max-width: 100%; height: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .download { text-align: center; padding: 20px; background: #e0f7fa; }
        .download button {
            padding: 14px 40px;
            font-size: 20px;
            background: #00b0f0;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .download button:hover { background: #0088cc; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CV de Ly Andrew</h1>
            <p>Compétent et émergent en solutions électroniques & réseaux</p>
            <p>📞 +33 6 58 20 12 80 | ✉️ andrew@contact31.fr</p>
        </div>
        <div class="cv-image">
            <img src="LY_andrew_CV.png" alt="CV Ly Andrew">
        </div>
        <div class="download">
            <a href="LY_andrew_CV.pdf" download="Ly_Andrew_CV.pdf">
                <button>Télécharger le CV en PDF</button>
            </a>
        </div>
    </div>
</body>
</html>
